<p-toast></p-toast>
<div class="admin-page">
  <p-card header="Categories" subheader="List of all categories">
    <div class="p-grid">
      <div class="p-col-md-8 p-col-sm-12">
        <p-toolbar>
          <div class="p-toolbar-group-left m-3 admin-toolbar-group">
            <p-button
              label="New"
              icon="pi pi-plus"
              styleClass="p-button-success admin-button"
              class="p-button p-button-success"
              routerLink="form"
            ></p-button>
          </div>
        </p-toolbar>
      </div>
    </div>
    <div class="p-grid">
      <p-table
        styleClass="admin-responsive-table"
        [value]="categories"
        [tableStyle]="{ 'min-width': '10rem' }"
        responsiveLayout="stack"
      >
        <ng-template pTemplate="header">
          <tr>
            <th pSortableColumn="name">Name <p-sortIcon></p-sortIcon></th>
            <th>icon</th>
            <th>color</th>
            <th></th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-Category>
          <tr class="admin-table-row">
            <td>
              <span class="admin-cell-label">Name</span>
              <span class="admin-cell-value">{{ Category.name }}</span>
            </td>
            <td>
              <span class="admin-cell-label">Icon</span>
              <span class="admin-cell-value">
                <i
                  class="pi"
                  [ngClass]="'pi-' + Category.icon"
                  style="font-size: 2rem"
                ></i>
              </span>
            </td>
            <td>
              <span class="admin-cell-label">Color</span>
              <span class="admin-cell-value">
                <i
                  class="pi"
                  ngClass="pi-circle-fill"
                  style="font-size: 2rem"
                  [ngStyle]="{ color: Category.color }"
                ></i>
              </span>
            </td>
            <td>
              <span class="admin-cell-label">Actions</span>
              <span class="admin-cell-value admin-action-group">
                <p-button
                  icon="pi pi-trash"
                  (onClick)="deleteCategory(Category.id)"
                  styleClass="p-button-danger admin-action-button"
                  class="mr-3"
                ></p-button>
                <p-button
                  icon="pi pi-pencil"
                  styleClass="p-button-success admin-action-button"
                  (onClick)="updateCategory(Category.id)"
                  class=""
                ></p-button>
              </span>
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </p-card>
</div>
<p-confirmDialog
  [style]="{ width: '50vw' }"
  [baseZIndex]="10000"
  rejectButtonStyleClass="p-button-text"
></p-confirmDialog>
