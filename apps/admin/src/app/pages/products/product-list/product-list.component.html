<p-toast></p-toast>
<div class="admin-page">
  <p-card header="Product" subheader="List of all product">
    <div class="p-grid">
      <div class="p-col-md-8 p-col-sm-12">
        <p-toolbar>
          <div class="p-toolbar-group-left m-3 admin-toolbar-group">
            <p-button
              label="New"
              icon="pi pi-plus"
              styleClass="p-button-success admin-button"
              class="p-button p-button-success"
              routerLink="form"
            ></p-button>
          </div>
        </p-toolbar>
      </div>
    </div>
    <div class="p-grid">
      <p-table
        styleClass="admin-responsive-table"
        [paginator]="true"
        [rows]="10"
        [showCurrentPageReport]="true"
        [value]="products"
        [rowsPerPageOptions]="[20, 30, 50]"
        [tableStyle]="{ 'min-width': '10rem' }"
        responsiveLayout="stack"
      >
        <ng-template pTemplate="header">
          <tr>
            <th pSortableColumn="name">
              Name <p-sortIcon field="name"></p-sortIcon>
            </th>
            <th>Image</th>
            <th pSortableColumn="price">
              Price <p-sortIcon field="price"></p-sortIcon>
            </th>
            <th pSortableColumn="stock">
              Stock <p-sortIcon field="stock"></p-sortIcon>
            </th>
            <th pSortableColumn="category">
              Category <p-sortIcon field="category"></p-sortIcon>
            </th>
            <th pSortableColumn="dateCreated">
              Created At<p-sortIcon field="dateCreated"></p-sortIcon>
            </th>

            <th></th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-product>
          <tr class="admin-table-row">
            <td>
              <span class="admin-cell-label">Name</span>
              <span class="admin-cell-value">{{ product.name }}</span>
            </td>
            <td>
              <span class="admin-cell-label">Image</span>
              <span class="admin-cell-value">
                <img [src]="product.img" class="admin-table-image" alt="" />
              </span>
            </td>
            <td>
              <span class="admin-cell-label">Price</span>
              <span class="admin-cell-value">{{ product.price }}</span>
            </td>
            <td>
              <span class="admin-cell-label">Stock</span>
              <span class="admin-cell-value">{{ product.countInStock }}</span>
            </td>
            <td>
              <span class="admin-cell-label">Category</span>
              <span class="admin-cell-value">{{ product.category.name }}</span>
            </td>
            <td>
              <span class="admin-cell-label">Created At</span>
              <span class="admin-cell-value">{{ product.dateCreated | date : 'short' }}</span>
            </td>

            <td>
              <span class="admin-cell-label">Actions</span>
              <span class="admin-cell-value admin-action-group">
                <p-button
                  icon="pi pi-trash"
                  styleClass="p-button-danger admin-action-button"
                  (onClick)="deleteProduct(product.id)"
                  class="mr-2"
                ></p-button>
                <p-button
                  icon="pi pi-pencil"
                  styleClass="p-button-success admin-action-button"
                  (onClick)="updateProduct(product.id)"
                  class=""
                ></p-button>
              </span>
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </p-card>
</div>
<p-confirmDialog
  [style]="{ width: '50vw' }"
  [baseZIndex]="10000"
  rejectButtonStyleClass="p-button-text"
></p-confirmDialog>
