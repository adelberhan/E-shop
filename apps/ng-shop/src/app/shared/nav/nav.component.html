<nav class="shop-nav" aria-label="Primary navigation">
  <a
    class="shop-nav__link"
    routerLink="/"
    routerLinkActive="is-active"
    [routerLinkActiveOptions]="{ exact: true }"
    (click)="onLinkClick()"
  >
    {{ 'nav.home' | translate }}
  </a>
  <a class="shop-nav__link" routerLink="/products" routerLinkActive="is-active" (click)="onLinkClick()">
    {{ 'nav.products' | translate }}
  </a>
</nav>
