<div class="order-summary">
  <h3>{{ 'orderSummary.title' | translate }}</h3>
  <div class="summary-price">
    <span>{{ 'orderSummary.itemPrice' | translate }}</span>
    <span>{{ totalPrice | currency }}</span>
  </div>

  <div class="summary-price">
    <span>{{ 'orderSummary.shipping' | translate }}</span>
    <span class="free">{{ 'common.free' | translate }}</span>
  </div>

  
  <div class="to-checkout">
    <div class="summary-price">
      <span>{{ 'orderSummary.totalPrice' | translate }}</span>
      <span>{{ totalPrice | currency }}</span>
    </div>
    <div class="checkout-button" *ngIf="!isCheckout">
      <p-button
        (onClick)="navigateToCheckout()"
        [label]="'buttons.checkout' | translate"
      ></p-button>
    </div>
  </div>
</div>
