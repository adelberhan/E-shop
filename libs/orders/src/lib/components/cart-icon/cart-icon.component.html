<a class="cart-icon" routerLink="/cart" aria-label="View shopping cart">
  <span class="cart-icon__symbol">
    <i class="pi pi-shopping-cart cart-icon__icon"></i>
    <span *ngIf="cartCount" class="cart-icon__badge">{{ cartCount }}</span>
  </span>
  <span class="cart-icon__label">Cart</span>
</a>
