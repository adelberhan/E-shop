<section class="thank-you-page">
  <div class="thank-you-page__card">
    <div class="thank-you-page__badge">
      <i class="pi pi-check"></i>
    </div>

    <span class="thank-you-page__eyebrow">{{ 'checkout.eyebrow' | translate }}</span>
    <h1 class="thank-you-page__title">{{ 'thankYou.title' | translate }}</h1>
    <p class="thank-you-page__subtitle">{{ 'thankYou.subtitle' | translate }}</p>

    <div class="thank-you-page__actions">
      <p-button
        [label]="'buttons.backToShop' | translate"
        routerLink="/"
        styleClass="thank-you-page__button"
      ></p-button>
    </div>
  </div>
</section>
