<section class="product-page" *ngIf="product">
  <div class="product-page__shell">
    <div class="product-page__hero">
      <div class="product-page__gallery">
        <ui-gallery [imgs]="product.images"></ui-gallery>
      </div>

      <div class="product-page__summary">
        <span class="product-page__eyebrow">{{ 'product.details' | translate }}</span>
        <h1 class="product-page__title">{{ product.name }}</h1>
        <p class="product-page__description">{{ product.description }}</p>

        <div class="product-page__rating">
          <p-rating
            [(ngModel)]="product.rating"
            [cancel]="false"
            [disabled]="true"
          ></p-rating>
        </div>

        <div class="product-page__price">
          <span class="product-page__price-current">{{ product.price | currency }}</span>
          <span class="product-page__price-before">
            {{ product.price + 22 | currency }}
          </span>
        </div>

        <div class="product-page__quantity">
          <label for="quantity">{{ 'product.quantity' | translate }}</label>
          <p-inputNumber
            class="product-page__quantity-input"
            [(ngModel)]="quantity"
            mode="decimal"
            [showButtons]="true"
            buttonLayout="horizontal"
            inputId="quantity"
            [min]="1"
            [max]="100"
            decrementButtonIcon="pi pi-minus"
            incrementButtonIcon="pi pi-plus"
            decrementButtonStyleClass="product-page__step-button product-page__step-button--decrement"
            incrementButtonStyleClass="product-page__step-button product-page__step-button--increment"
          >
          </p-inputNumber>
        </div>

        <div class="product-page__actions">
          <button
            pButton
            pRipple
            [label]="'buttons.buyNow' | translate"
            routerLink="/checkout"
            (click)="addToCart()"
            class="product-page__button product-page__button--primary"
          ></button>
          <button
            pButton
            pRipple
            [label]="'buttons.addToCart' | translate"
            (click)="addToCart()"
            class="product-page__button product-page__button--secondary"
          ></button>
        </div>
      </div>
    </div>

    <section class="product-page__details" *ngIf="product.richDescription">
      <h2>{{ 'product.about' | translate }}</h2>
      <div class="product-page__rich-content" [innerHTML]="product.richDescription"></div>
    </section>
  </div>
</section>
