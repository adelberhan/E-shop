<div class="banner">
  <div class="banner-content">
    <div class="banner-text">
      <h1>{{ 'banner.title' | translate }}</h1>
      <h2>{{ 'banner.subtitle' | translate }}</h2>
      <p-button
        styleClass="banner-button"
        [label]="'banner.seeMore' | translate"
        [icon]="isRtl ? 'pi pi-chevron-left' : 'pi pi-chevron-right'"
        [iconPos]="isRtl ? 'left' : 'right'"
        (onClick)="goToProducts()"
      ></p-button>
    </div>
    <div class="banner-image animate__animated animate__slideInLeft">
      <img
        src="assets/imgs/banner-image.svg"
        alt="Banner"
      />
    </div>
  </div>
</div>
